name: release-please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Maintains the release PR (version bump from conventional
      # commits) and, when that PR is merged, creates the GitHub release + tag.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # When a release was just created, build and publish it to PyPI. This is
      # done in the same job because a release created with GITHUB_TOKEN does not
      # trigger a separate `on: release` workflow. (Zenodo still mints the DOI
      # from the release webhook, independently of Actions.)
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-python@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          python-version: '3.13'
      - name: Install poetry
        if: ${{ steps.release.outputs.release_created }}
        run: |
          python -m pip install --upgrade pip
          pip install poetry
      - name: Build and publish to PyPI
        if: ${{ steps.release.outputs.release_created }}
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish --build
